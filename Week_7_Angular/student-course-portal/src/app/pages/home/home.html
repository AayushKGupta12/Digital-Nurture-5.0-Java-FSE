<h1>{{ portalName }}</h1>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">

  Enroll Now

</button>
<p>{{ message }}</p>

<hr>

<input
  type="text"
  placeholder="Search Courses"
  [(ngModel)]="searchTerm">

<p>Searching for: {{ searchTerm }}</p>

<p>
  Manage your courses, enroll in new subjects, and track your academic
  progress.
</p>

<div class="stats">
  <div class="card">
    <h3>Courses Available</h3>
    <p>{{ courseCount }}</p>
  </div>

  <div class="card">
    <h3>Enrolled</h3>
    <p>3</p>
  </div>

  <div class="card">
    <h3>GPA</h3>
    <p>3.8</p>
  </div>
</div>
